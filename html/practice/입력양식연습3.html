<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #memo {
            width: 200px;
            height: 100px;
        }
    </style>
</head>
<body>
    <form action="서버페이지주소.php" method="post"> 
        
        <fieldset>
            <legend>상품 선택</legend>
            <br>
            <b>주문할 상품을 선택해 주세요.</b>
            <ul>
                <li><input type="checkbox" name="" id="">선물용 3kg <input type="number" max="5">개 (최대 5개)</li>
                <li><input type="checkbox" name="" id="">선물용 5kg <input type="number" max="3">개 (최대 3개)</li>
                <li><input type="checkbox" name="" id="">가정용 3kg <input type="number" max="5">개 (최대 5개)</li>
                <li><input type="checkbox" name="" id="">가정용 5kg <input type="number" max="3">개 (최대 3개)</li>
            </ul>
            <b>포장 선택</b>
            <ul>
                <li><input type="radio" name="선물" id="">선물 포장</li>
                <li><input type="radio" name="선물" id="">선물 포장 안 함</li>
            </ul>
        </fieldset>
        
        <fieldset>
            <legend>배송 정보</legend>
            <ul>
                <li>이름<input type="text"></li>
                <li>배송 주소<input type="text"></li>
                <li>이메일<input type="email"></li>
                <li>연락처<input type="text"></li>
                <li>배송 지정<input type="date" name="" id="">(주문일로부터 최소 3일 이후)</li>
                <li>메모<input type="text" name="" id="memo"></li>
            </ul>
        </fieldset>
        
        <div style="margin-top: 10px;">
            <input type="submit" value="주문하기"> 
            <input type="reset" value="취소하기">
        </div>

    </form>
</body>
</html>
