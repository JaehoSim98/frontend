<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #지원동기 {
            width: 200px;
            height: 100px;
        }
    </style>
</head>
<body>
    <h1>프런트엔드 개발자 지원서</h1>
    <br>
    HTML, CSS, Javascript에 대한 기술적 이해와 경험이 있는 분을 찾습니다.
    <hr><br>
    <form action="">
    <b>개인정보</b><br>
    <ul>
        <li>이름 <input type="text" name="name" id="name" placeholder="공백없이 입력하세요."></li>
        <li>연락처 <input type="text"></li>
    </ul>
    <b>지원 분야</b><br>
    <ul>
        <li><input type="radio" name="지원분야" id="웹퍼블리싱"> 웹 퍼블리싱</li>
        <li><input type="radio" name="지원분야" id="웹어플리케이션개발"> 웹 어플리케이션 개발 </li>
        <li><input type="radio" name="지원분야" id="개발환경개선"> 개발 환경 개선</li>
    </ul>
    <b>지원동기</b><br>
    <input type="text" name="지원동기" id="지원동기" placeholder="본사 지원 동기를 간략히 써 주세요."><br>
    <input type="submit" value="접수하기"> <input type="reset" value="다시 쓰기">
    </form>
</body>
</html>
