<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>입력양식</h1>
    <form action="loginAction.html" method="get" name="loginForm" target="_self">
        id : <input type="text" name="id" minlength="4" maxlength="12"><br>
        아이디는 4자이상 12자 이하로 작성 가능합니다.<br>
        pw : <input type="password" name="pw" required><br>
        <input type="button" value="Login"><br>
        <input type="reset" value="Reset"><br>
        <input type="submit" value="Submit">
    </form>
    <hr>
    <h1>입력양식의 종류</h1>
    <form action="">
        text: <input type="text" value="shit"><br>
        password: <input type="password" name="pw" id="pw"><br>
        button: <input type="button" value="button"><br>
        checkbox: <input type="checkbox" name="checkbox" id=""><br>
        search: <input type="search" name="" id=""><br>
        url: <input type="url" name="" id=""><br>
        email: <input type="email" name="" id=""><br>
        <input type="submit" value="Sign in">
    </form>
</body>
</html>
