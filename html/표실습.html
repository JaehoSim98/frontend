<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <table border="1px" width="auto">

                <th>중량</th>
                <th>갯수</th>
                <th>가격</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td rowspan="2" align="center">선물용</td>
                <td align="center">3kg</td>

            <tr>
                <td align="center">5kg</td>

            </tr>

                <td align="center">3kg</td>
                <td align="center">11과</td>
                <td align="center">4만원</td>
            </tr>
            <tr>
                <td align="center">5kg</td>
                <td align="center">15과</td>
                <td align="center">6만원</td>
            </tr>
        </tbody>
    </table>
    <br>
    <img src="/html/img/salad.jpg" alt="salad">
    <!-- 
        단위
        %(가변길이): 웹브라우져의 창의 크기를 기준으로 크기를 결정
        px(고정길이): 픽셀의 크기만큼 크기를 표시
        너비 -> width
        높이 -> height
        둘 중 하나만 지정해도 나머지 속성은 자동으로 비율을 계산함

    -->











</body>
